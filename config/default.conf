# claw-tmux default configuration
# Override in ~/.claw-tmux/config or via environment variables

# Idle detection threshold (seconds, used by tmux monitor-silence)
CLAW_TMUX_IDLE_SEC=30

# Default CLI tool
CLAW_TMUX_DEFAULT_TOOL=codex

# Terminal size
CLAW_TMUX_COLS=200
CLAW_TMUX_ROWS=50

# Cooldown for `new` command (seconds, prevents duplicate session creation)
CLAW_TMUX_NEW_COOLDOWN=5
